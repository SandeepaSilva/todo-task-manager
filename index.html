<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List application</title>
    
    <!-- Link to Google Fonts for nice typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for standard icons (trash, checkmark, plus) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link to our stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main wrapper to center our app on the screen -->
    <div class="app-container">
        
        <!-- Header Section with Title and Stats -->
        <header class="app-header">
            <h1>My Tasks</h1>
            <div class="stats">
                <span id="total-count">Total: 0</span>
                <span class="divider">|</span>
                <span id="completed-count">Completed: 0</span>
            </div>
        </header>

        <!-- Input Box and Add Button -->
        <div class="input-container">
            <input type="text" id="task-input" placeholder="Press Enter to add task">
            <button id="add-btn" class="btn add-btn">
                <i class="fa-solid fa-plus"></i> Add
            </button>
        </div>

        <!-- Filters (All, Pending, Completed) -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- The List that holds all tasks -->
        <ul id="task-list" class="task-list">
            <!-- Tasks will be injected here by JavaScript -->
        </ul>
        
    </div>

    <!-- Link to our JavaScript logic -->
    <script src="script.js"></script>
</body>
</html>
